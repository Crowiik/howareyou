<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Work Schedule</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0f1117;
    --surface: #1a1d27;
    --surface-hover: #22262f;
    --border: #2a2e3a;
    --text: #e4e6ed;
    --text-dim: #8b8fa3;
    --accent-blue: #4e8fff;
    --accent-green: #34d399;
    --accent-amber: #f59e0b;
    --accent-rose: #f472b6;
    --accent-purple: #a78bfa;
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }

  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(15, 17, 23, 0.85);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border);
    padding: 16px 20px 12px;
  }

  .header-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 12px;
  }

  .logo {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.3px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .logo-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    animation: pulse 2s ease-in-out infinite;
  }

  .logo-dot.live { background: var(--accent-green); box-shadow: 0 0 8px var(--accent-green); }
  .logo-dot.offline { background: var(--accent-amber); box-shadow: 0 0 8px var(--accent-amber); }
  .logo-dot.error { background: var(--accent-rose); box-shadow: 0 0 8px var(--accent-rose); }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }

  .refresh-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text-dim);
    padding: 6px 12px;
    border-radius: 100px;
    font-family: inherit;
    font-size: 12px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 5px;
    transition: all 0.2s;
  }

  .refresh-btn:hover { border-color: var(--accent-blue); color: var(--text); }

  .refresh-btn.spinning svg { animation: spin 0.8s linear infinite; }

  @keyframes spin { to { transform: rotate(360deg); } }

  .search-wrap { position: relative; }

  .search-icon {
    position: absolute;
    left: 14px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--text-dim);
    pointer-events: none;
  }

  .search {
    width: 100%;
    padding: 12px 14px 12px 42px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    color: var(--text);
    font-family: inherit;
    font-size: 15px;
    outline: none;
    transition: border-color 0.2s;
  }

  .search:focus { border-color: var(--accent-blue); }
  .search::placeholder { color: var(--text-dim); }

  .search-hint {
    margin-top: 6px;
    font-size: 12px;
    color: var(--text-dim);
    display: none;
  }

  .search-hint.visible { display: block; }

  /* --- MANAGER FILTER --- */
  .filter-bar {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
    padding: 10px 20px 2px;
  }

  .filter-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-dim);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    display: flex;
    align-items: center;
    margin-right: 4px;
  }

  .filter-chip {
    padding: 6px 14px;
    border-radius: 100px;
    font-size: 12px;
    font-weight: 600;
    font-family: inherit;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .filter-chip:hover { background: var(--surface); color: var(--text); }

  .filter-chip.active {
    background: rgba(78, 143, 255, 0.12);
    color: var(--accent-blue);
    border-color: rgba(78, 143, 255, 0.3);
  }

  .filter-chip .chip-dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    flex-shrink: 0;
  }

  .filter-chip .chip-count {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    opacity: 0.6;
  }

  .date-tabs {
    display: flex;
    gap: 6px;
    overflow-x: auto;
    padding: 12px 20px;
    -webkit-overflow-scrolling: touch;
    scrollbar-width: none;
  }

  .date-tabs::-webkit-scrollbar { display: none; }

  .date-tab {
    flex-shrink: 0;
    padding: 8px 16px;
    border-radius: 100px;
    font-size: 13px;
    font-weight: 600;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
    transition: all 0.2s;
    white-space: nowrap;
  }

  .date-tab:hover { background: var(--surface); color: var(--text); }

  .date-tab.active {
    background: var(--accent-blue);
    color: #fff;
    border-color: var(--accent-blue);
  }

  .date-tab .tab-day {
    display: block;
    font-size: 10px;
    font-weight: 500;
    opacity: 0.7;
    text-transform: uppercase;
    margin-bottom: 1px;
  }

  .content {
    padding: 8px 16px 100px;
    max-width: 640px;
    margin: 0 auto;
  }

  .team-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 12px;
    overflow: hidden;
    animation: fadeUp 0.35s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .team-header {
    padding: 14px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    transition: background 0.15s;
  }

  .team-header:hover { background: var(--surface-hover); }

  .team-header-right {

    align-items: center;
    gap: 10px;
  }

  .toggle-icon {
    width: 20px;
    height: 20px;
    color: var(--text-dim);
    transition: transform 0.25s ease;
    flex-shrink: 0;
  }

  .team-card.collapsed .toggle-icon {
    transform: rotate(-90deg);
  }

  .team-body {
    overflow: hidden;
    transition: grid-template-rows 0.3s ease;
    display: grid;
    grid-template-rows: 1fr;
  }

  .team-card.collapsed .team-body {
    grid-template-rows: 0fr;
  }

  .team-body-inner {

  }

  .team-label {

    align-items: center;
    gap: 10px;

  .team-color {

    height: 32px;
    border-radius: 4px;

  .team-name {

    font-size: 15px;
    line-height: 1.2;

  .team-meta {

    color: var(--text-dim);
    margin-top: 2px;

  .team-badge {

    font-size: 11px;
    font-weight: 500;
    padding: 4px 10px;
    border-radius: 100px;
    background: rgba(78, 143, 255, 0.12);
    color: var(--accent-blue);
  }

    padding: 10px 16px;
    display: flex;
    align-items: center;
    gap: 16px;
    font-size: 13px;
    color: var(--text-dim);
    background: rgba(255,255,255,0.02);
    border-bottom: 1px solid var(--border);

  .location-bar span {
    display: flex;
    align-items: center;
    gap: 5px;
  }

  .worker-list { padding: 4px 0; }

  .worker-row {

    align-items: center;
    padding: 10px 16px;
    gap: 12px;
    transition: background 0.15s;
  }

  .worker-row:hover { background: var(--surface-hover); }

  .worker-row.highlighted {

  .worker-row.highlighted::before {
    content: '';
    position: absolute;
    left: 0; top: 0; bottom: 0;
    width: 3px;
    background: var(--accent-blue);

  .worker-num {

    font-size: 12px;
    color: var(--text-dim);
    width: 20px;
    text-align: center;
    flex-shrink: 0;

  .worker-avatar {

    align-items: center;
    justify-content: center;
    font-weight: 700;
    font-size: 12px;
    flex-shrink: 0;
    color: #fff;

  .worker-info { flex: 1; min-width: 0; }

  .worker-name-row {

    align-items: baseline;
    gap: 6px;

  .worker-name {
    font-weight: 600;
    font-size: 14px;
    line-height: 1.3;
    white-space: nowrap;

  .worker-id {

  }

  .worker-meta {

    margin-top: 3px;

  }

  .worker-meta-item {
    display: flex;
    align-items: center;
    gap: 3px;
    font-size: 11px;
    line-height: 1;
  }

    font-size: 10px;
    flex-shrink: 0;
  }

  .worker-farm {

    font-weight: 500;

  .worker-gang {

    align-items: center;

    gap: 4px;
    font-size: 11px;
    line-height: 1.5;

    flex-shrink: 0;
  }

    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .worker-driver {
    color: var(--accent-blue);
    font-weight: 500;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .location-subheader {
    padding: 8px 16px;
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
    background: rgba(255,255,255,0.03);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 6px;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
    transition: background 0.15s;

    width: 16px;
    height: 16px;
    color: var(--text-dim);
    transition: transform 0.25s ease;
    flex-shrink: 0;
  }

  }

  .location-group .loc-body {
    display: grid;
    grid-template-rows: 1fr;
    transition: grid-template-rows 0.3s ease;
    overflow: hidden;
  }

  .location-group.loc-collapsed .loc-body {
    grid-template-rows: 0fr;
  }

  .location-group .loc-body-inner {
    overflow: hidden;
  }

    font-size: 11px;
    font-weight: 500;
    color: var(--text-dim);
    background: rgba(255,255,255,0.06);
    padding: 2px 8px;
    border-radius: 100px;
    margin-left: auto;
  }

    padding: 12px 20px;
    display: flex;
    gap: 16px;
    flex-wrap: wrap;
    font-size: 13px;
    color: var(--text-dim);
    border-bottom: 1px solid var(--border);
  }

    display: flex;
    align-items: center;
    gap: 6px;
  }

    text-align: center;
    padding: 60px 20px;
    color: var(--text-dim);
  }

  .empty-state .empty-icon { font-size: 40px; margin-bottom: 12px; }

    padding: 40px 20px;
    color: var(--text-dim);
  }

  .loading {
    text-align: center;
    padding: 80px 20px;
    color: var(--text-dim);
  }

  .loading-spinner {
    width: 32px; height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent-blue);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin: 0 auto 16px;
  }

  .status-msg {
    font-size: 12px;
    color: var(--text-dim);
    text-align: center;
    padding: 4px 20px 0;
  }

  @media (min-width: 640px) {
    .content { padding: 16px 24px 100px; }
    .header { padding: 20px 24px 14px; }
    .date-tabs { padding: 14px 24px; }

</style>
</head>

// ============================================================
//  CSV PARSER
// ============================================================
function parseCSV(text) {
  const lines = text.trim().replace(/\r/g, '').split('\n');
  if (lines.length < 2) return [];
  const headers = lines[0].split(',').map(h => h.trim());
  return lines.slice(1).map(line => {
    const vals = [];
    let current = '';
    let inQuotes = false;
    for (let i = 0; i < line.length; i++) {
      const ch = line[i];
      if (ch === '"') { inQuotes = !inQuotes; }
      else if (ch === ',' && !inQuotes) { vals.push(current.trim()); current = ''; }
      else { current += ch; }
    }
    vals.push(current.trim());
    const obj = {};
    headers.forEach((h, i) => { obj[h] = vals[i] || ''; });
    return obj;
  });
}

// ============================================================
//  DATE HELPERS
// ============================================================
function parseDate(str) {
  // Handles DD/MM/YYYY, YYYY-MM-DD, MM/DD/YYYY
  let d;
  if (/^\d{2}\/\d{2}\/\d{4}$/.test(str)) {
    const [dd, mm, yyyy] = str.split('/');
    d = new Date(yyyy, mm - 1, dd);
  } else if (/^\d{4}-\d{2}-\d{2}$/.test(str)) {
    const [yyyy, mm, dd] = str.split('-');
    d = new Date(yyyy, mm - 1, dd);
  } else {
    d = new Date(str);
  }
  return isNaN(d) ? null : d;
}

function formatDateKey(d) {
  return d.toISOString().slice(0, 10);
}

function formatDateLabel(d) {
  return d.toLocaleDateString('en-GB', { day: 'numeric', month: 'short' });
}

function formatDayName(d) {
  return d.toLocaleDateString('en-GB', { weekday: 'short' });
}

// ============================================================

  if (rows.length > 0) {
    console.log('processRows keys:', Object.keys(rows[0]));
    console.log('processRows first row:', rows[0]);
  }

  // Flexible column lookup — accepts a string or array of possible names
  function getVal(row, colNames) {
    const names = Array.isArray(colNames) ? colNames : [colNames];
    for (const name of names) {
      // Exact match
      if (row[name] !== undefined && row[name] !== '') return row[name];
    }
    // Case-insensitive fallback
    for (const name of names) {
      const key = Object.keys(row).find(k => k.toLowerCase().trim() === name.toLowerCase().trim());
      if (key && row[key] !== undefined && row[key] !== '') return row[key];
    }
    return '';
  }

  const dayMap = {};
  let colorIdx = 0;
  const managerColors = {};

  rows.forEach(row => {
    const dateStr = getVal(row, COL.date);
    const d = parseDate(dateStr);
    if (!d) return;
    const key = formatDateKey(d);

    if (!dayMap[key]) {
      dayMap[key] = { date: key, dateObj: d, label: formatDateLabel(d), dayName: formatDayName(d), teamMap: {} };
    }

    const manager = row['Manager'] || getVal(row, 'Manager') || 'Unassigned';
    const comment = getVal(row, COL.comment) || '';
    const teamKey = manager;

    if (!managerColors[teamKey]) {
      managerColors[teamKey] = TEAM_COLORS[colorIdx % TEAM_COLORS.length];
      colorIdx++;
    }

    // Parse start time — may include extra text like "7:00 parking"
    const rawTime = getVal(row, COL.startTime) || '';
    const timeParts = rawTime.match(/^(\d{1,2}:\d{2})/);
    const time = timeParts ? timeParts[1] : rawTime;
    const note = rawTime.replace(time, '').trim();
    const location = getVal(row, COL.location) || '';

    if (!dayMap[key].teamMap[teamKey]) {
      dayMap[key].teamMap[teamKey] = {
        manager,
        gang: getVal(row, COL.gang) || '',
        startTime: time,
        note,
        color: managerColors[teamKey],
        workers: []
      };
    }

    dayMap[key].teamMap[teamKey].workers.push({
      id: getVal(row, COL.id) || '',
      name: getVal(row, COL.name) || '',
      campsite: getVal(row, COL.campsite) || '',
      driver: comment,
      location: location,
      startTime: rawTime,
      gang: getVal(row, COL.gang) || ''
    });
  });

  // Convert to sorted array
  return Object.values(dayMap)
    .sort((a, b) => a.dateObj - b.dateObj)
    .map(day => ({
      date: day.date,
      label: day.label,
      dayName: day.dayName,
      teams: Object.values(day.teamMap)
    }));
}

// ============================================================
//  DATA FETCHING (CORS-free via Google Visualization JSONP)
// ============================================================

function fetchSheet(gid) {
  return new Promise((resolve, reject) => {
    const callbackName = '_sheetCb_' + gid + '_' + Date.now();
    const url = 'https://docs.google.com/spreadsheets/d/' +
      SPREADSHEET_ID +
      '/gviz/tq?tqx=responseHandler:' + callbackName +
      '&gid=' + gid;

    const timeout = setTimeout(() => {
      cleanup();
      reject(new Error('Request timed out for gid=' + gid));
    }, 15000);

    function cleanup() {
      clearTimeout(timeout);
      delete window[callbackName];
      if (script.parentNode) script.parentNode.removeChild(script);
    }

    window[callbackName] = function(response) {
      cleanup();

      if (!response || !response.table) {
        reject(new Error('No data in response'));
        return;
      }

      const allCols = response.table.cols;
      const allDataRows = response.table.rows;
      const allRows = [];

      console.log('Total columns from sheet:', allCols.length);
      console.log('Column labels:', allCols.map(c => c.label));

      MANAGER_RANGES.forEach(range => {
        // Extract headers for this manager's block
        const blockCols = [];
        for (let i = range.startCol; i <= range.endCol && i < allCols.length; i++) {
          blockCols.push({ index: i, label: (allCols[i].label || '').trim() });
        }

        console.log(range.manager + ' columns (' + range.startCol + '-' + range.endCol + '):', blockCols.map(c => c.label));

        // Process each data row for this manager's block
        allDataRows.forEach(r => {
          if (!r.c) return;

          const obj = { Manager: range.manager };
          let hasData = false;

          blockCols.forEach(col => {
            const cell = r.c[col.index];
            if (!col.label) return;
            if (!cell || cell.v == null) { obj[col.label] = ''; return; }

            // Google Viz date handling
            if (typeof cell.v === 'string' && cell.v.startsWith('Date(')) {
              const m = cell.v.match(/Date\((\d+),(\d+),(\d+)\)/);
              if (m) {
                const dd = String(m[3]).padStart(2, '0');
                const mm = String(Number(m[2]) + 1).padStart(2, '0');
                obj[col.label] = dd + '/' + mm + '/' + m[1];
                hasData = true;
                return;
              }
            }

            obj[col.label] = String(cell.v);
            if (String(cell.v).trim()) hasData = true;
          });

          // Only add row if it has actual data (skip empty rows)
          if (hasData) allRows.push(obj);
        });
      });

      console.log('Loaded gid=' + gid + ':', allRows.length, 'total rows across all managers');
      if (allRows.length > 0) console.log('First row:', allRows[0]);
      resolve(allRows);
    };

    const script = document.createElement('script');
    script.src = url;
    script.onerror = () => {
      cleanup();
      reject(new Error('Failed to load sheet gid=' + gid));
    };
    document.head.appendChild(script);
  });
}

async function fetchAllData() {
  let allRows = [];

  if (!SPREADSHEET_ID) {
    allRows = parseCSV(FALLBACK_CSV);
    setStatus('demo');
  } else {
    try {
      const results = await Promise.all(
        SHEET_GIDS.map(gid => fetchSheet(gid))
      );
      results.forEach(rows => allRows.push(...rows));
      if (allRows.length > 0) {
        setStatus('live');
      } else {
        console.warn('Sheets returned 0 rows, using fallback');
        allRows = parseCSV(FALLBACK_CSV);
        setStatus('error');
      }
    } catch (err) {
      console.error('Fetch error:', err);
      setStatus('error');
      allRows = parseCSV(FALLBACK_CSV);
    }
  }

  return processRows(allRows);
}

// ============================================================
//  UI
// ============================================================
const AVATAR_COLORS = ['#4e8fff','#34d399','#f59e0b','#f472b6','#a78bfa','#06b6d4','#ef4444','#84cc16'];

function getAvatarColor(name) {
  let h = 0;
  for (let i = 0; i < name.length; i++) h = name.charCodeAt(i) + ((h << 5) - h);
  return AVATAR_COLORS[Math.abs(h) % AVATAR_COLORS.length];
}

function getInitials(name) {
  const p = name.trim().split(/\s+/);
  return p.length === 1 ? p[0][0].toUpperCase() : (p[0][0] + p[p.length-1][0]).toUpperCase();
}

function highlightText(text, q) {
  if (!q) return text;
  const idx = text.toLowerCase().indexOf(q);
  if (idx === -1) return text;
  return text.slice(0, idx) +
    '<mark style="background:rgba(78,143,255,0.25);color:inherit;border-radius:2px;padding:0 1px">' +
    text.slice(idx, idx + q.length) + '</mark>' + text.slice(idx + q.length);
}

let SCHEDULE_DATA = [];
let currentDate = null;
let searchQuery = '';
let selectedManager = null; // null = show all

function setStatus(mode) {
  const dot = document.getElementById('statusDot');
  const msg = document.getElementById('statusMsg');
  dot.className = 'logo-dot ' + (mode === 'live' ? 'live' : mode === 'error' ? 'error' : 'offline');
  if (mode === 'demo') msg.textContent = 'Showing demo data — add your Google Sheet URLs to go live';
  else if (mode === 'error') msg.textContent = 'Could not fetch sheet — showing cached data';
  else if (mode === 'live') msg.textContent = '';
}

function renderManagerFilter() {
  const container = document.getElementById('managerFilter');
  const day = SCHEDULE_DATA.find(d => d.date === currentDate);
  if (!day) { container.innerHTML = ''; return; }

  // Collect unique managers with their colors and worker counts
  const managers = [];
  const seen = new Set();
  day.teams.forEach(team => {
    if (!seen.has(team.manager)) {
      seen.add(team.manager);
      const count = day.teams
        .filter(t => t.manager === team.manager)
        .reduce((s, t) => s + t.workers.length, 0);
      managers.push({ name: team.manager, color: team.color, count });
    }
  });

  if (managers.length <= 1) { container.innerHTML = ''; return; }

  container.innerHTML =
    `<span class="filter-label">Manager</span>` +
    `<button class="filter-chip ${selectedManager === null ? 'active' : ''}" data-manager="">All</button>` +
    managers.map(m =>
      `<button class="filter-chip ${selectedManager === m.name ? 'active' : ''}" data-manager="${m.name}">
        <span class="chip-dot" style="background:${m.color}"></span>
        ${m.name}
        <span class="chip-count">${m.count}</span>
      </button>`
    ).join('');

  container.querySelectorAll('.filter-chip').forEach(btn => {
    btn.addEventListener('click', () => {
      const val = btn.dataset.manager;
      selectedManager = val === '' ? null : val;
      renderManagerFilter();
      renderContent();
    });
  });
}

function renderTabs() {
  const tabs = document.getElementById('dateTabs');
  tabs.innerHTML = SCHEDULE_DATA.map(d =>
    `<button class="date-tab ${d.date === currentDate ? 'active' : ''}" data-date="${d.date}">
      <span class="tab-day">${d.dayName}</span>${d.label}
    </button>`
  ).join('');
  tabs.querySelectorAll('.date-tab').forEach(btn => {
    btn.addEventListener('click', () => {
      currentDate = btn.dataset.date;
      selectedManager = null; // reset filter on date change
      renderTabs();
      renderManagerFilter();
      renderContent();
    });
  });
}

function renderContent() {
  const content = document.getElementById('content');
  const summary = document.getElementById('summaryBar');
  const hint = document.getElementById('searchHint');
  const day = SCHEDULE_DATA.find(d => d.date === currentDate);

  if (!day) {
    content.innerHTML = '<div class="empty-state"><div class="empty-icon">📋</div><p>No schedule data yet</p></div>';
    summary.innerHTML = '';
    return;
  }

  const q = searchQuery.toLowerCase().trim();
  let totalWorkers = 0, matchedWorkers = 0;
  let html = '';

  // Filter teams by selected manager
  const visibleTeams = selectedManager
    ? day.teams.filter(t => t.manager === selectedManager)
    : day.teams;

  visibleTeams.forEach((team, ti) => {
    const filtered = team.workers.filter(w => {
      const match = !q || w.name.toLowerCase().includes(q) || w.id.includes(q);
      totalWorkers++;
      if (match) matchedWorkers++;
      return match;
    });
    if (filtered.length === 0) return;

    // Group filtered workers by location
    const locationGroups = {};
    filtered.forEach(w => {
      const loc = w.location || 'Unspecified';
      if (!locationGroups[loc]) locationGroups[loc] = [];
      locationGroups[loc].push(w);
    });
    const locations = Object.keys(locationGroups);

    // Get unique locations for the header
    const allLocations = [...new Set(team.workers.map(w => w.location))].filter(Boolean);

    html += `<div class="team-card collapsed" style="animation-delay:${ti * 0.06}s" id="team-${ti}">
      <div class="team-header" onclick="document.getElementById('team-${ti}').classList.toggle('collapsed')">
        <div class="team-label">
          <div class="team-color" style="background:${team.color}"></div>
          <div>
            <div class="team-name">${team.manager}</div>
            <div class="team-meta">${filtered.length} worker${filtered.length !== 1 ? 's' : ''}${allLocations.length > 1 ? ' · ' + allLocations.length + ' locations' : ''}</div>
          </div>
        </div>
        <div class="team-header-right">
          <svg class="toggle-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
        </div>
      </div>
      <div class="team-body"><div class="team-body-inner">`;

    let li = 0;
    locations.forEach(loc => {
      const workers = locationGroups[loc];

      // Show location subheader (always show if multiple locations, or as single bar)
      const locId = 'loc-' + ti + '-' + li;
      li++;
      html += `<div class="location-group" id="${locId}">
      <div class="location-subheader" onclick="document.getElementById('${locId}').classList.toggle('loc-collapsed')">
        <span>📍 Farm location: ${loc}</span>
        <span class="loc-badge">${workers.length} worker${workers.length !== 1 ? 's' : ''}</span>
        <svg class="loc-toggle" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 12 15 18 9"/></svg>
      </div>
      <div class="loc-body"><div class="loc-body-inner">
      <div class="worker-list">
        ${workers.map((w, i) => {
          const hl = q && (w.name.toLowerCase().includes(q) || w.id.includes(q));
          return `<div class="worker-row ${hl ? 'highlighted' : ''}">
            <span class="worker-num">${i+1}</span>
            <div class="worker-avatar" style="background:${getAvatarColor(w.name)}">${getInitials(w.name)}</div>
            <div class="worker-info">
              <div class="worker-name-row">
                <div class="worker-name">${highlightText(w.name, q)}</div>
                <div class="worker-id">#${highlightText(w.id, q)}</div>
              </div>
              <div class="worker-meta">
                ${w.gang ? '<span class="worker-meta-item"><span class="meta-icon">👥</span><span class="worker-gang">' + w.gang + '</span></span>' : ''}
                ${w.startTime ? '<span class="worker-meta-item"><span class="meta-icon">⏰</span><span class="worker-time">' + w.startTime + '</span></span>' : ''}
                ${w.campsite ? '<span class="worker-meta-item"><span class="meta-icon">🏕</span><span class="worker-campsite">' + w.campsite + '</span></span>' : ''}
              </div>
            </div>
            <div class="worker-details">
              ${w.location ? '<div class="worker-detail-row"><span class="detail-icon">🌾</span><span class="worker-farm">' + w.location + '</span></div>' : ''}
              ${w.driver ? '<div class="worker-detail-row"><span class="detail-icon">🚐</span><span class="worker-driver">' + w.driver + '</span></div>' : ''}
            </div>
          </div>`;
        }).join('')}
      </div>
      </div></div>
      </div>`;
    });

    html += `</div></div>
    </div>`;
  });

  content.innerHTML = html || `<div class="no-results"><p>No workers found matching "${searchQuery}"</p></div>`;

  const allW = visibleTeams.reduce((s, t) => s + t.workers.length, 0);
  const locs = [...new Set(visibleTeams.flatMap(t => t.workers.map(w => w.location)).filter(Boolean))];
  summary.innerHTML = `
    <div class="summary-item">👥 <strong>${allW}</strong> workers</div>
    <div class="summary-item">🚐 <strong>${day.teams.length}</strong> groups</div>
  `;

  if (q && matchedWorkers < totalWorkers) {
    hint.textContent = `Showing ${matchedWorkers} of ${totalWorkers} workers`;
    hint.classList.add('visible');
  } else {
    hint.classList.remove('visible');
  }
}

// ============================================================
//  INIT
// ============================================================
async function loadData() {
  const btn = document.getElementById('refreshBtn');
  btn.classList.add('spinning');
  SCHEDULE_DATA = await fetchAllData();
  if (SCHEDULE_DATA.length > 0 && !SCHEDULE_DATA.find(d => d.date === currentDate)) {
    currentDate = SCHEDULE_DATA[0].date;
  }
  renderTabs();
  renderManagerFilter();
  renderContent();
  btn.classList.remove('spinning');
}

document.getElementById('refreshBtn').addEventListener('click', loadData);

let debounce;
document.getElementById('searchInput').addEventListener('input', e => {
  clearTimeout(debounce);
  debounce = setTimeout(() => { searchQuery = e.target.value; renderContent(); }, 200);
});

loadData();
</script>
